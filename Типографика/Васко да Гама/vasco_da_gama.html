<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ВАСКО ДА ГАМА</title>
<style>
:root{--bg:#f7f7f5;--paper:#fbfbfa;--ink:#0b0b0b;--line:2px solid var(--ink);--r:34px;--max:1180px;--fs-lg:64px;--fs-md:28px;--fs-sm:18px}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);line-height:1.12;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.wrap{width:min(calc(100% - 32px),var(--max));margin:0 auto}
header{border-bottom:var(--line);background:var(--paper);position:sticky;top:0;z-index:40}
.nav{min-height:72px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.nav a{border:var(--line);border-radius:999px;background:#fff;padding:9px 18px;font-size:var(--fs-sm);transition:.25s}
.nav a:hover{background:#000;color:#fff;transform:translateY(-2px)}
main{padding:54px 0 74px}
.project-intro{margin:0 0 42px}
.project-intro h1{font-size:var(--fs-lg);line-height:.88;letter-spacing:-.075em;margin:0}
.project-desc{font-size:var(--fs-md);line-height:1.1;letter-spacing:-.04em;max-width:980px;margin:20px 0 0}
.case-frame{border:var(--line);border-radius:var(--r);overflow:hidden;background:var(--paper);box-shadow:18px 18px 0 #000;line-height:0}
.case-frame img{width:100%;height:auto;display:block;margin:0;padding:0;border:0}
footer{border-top:var(--line);padding:16px 0 22px;font-size:18px;background:var(--bg)}
.footer-inner{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:center}
.footer-links{display:flex;gap:18px;flex-wrap:wrap}
.footer-links a:hover{text-decoration:underline}
@media(max-width:620px){:root{--fs-lg:52px;--fs-md:24px;--fs-sm:18px}main{padding-top:36px}.case-frame{border-radius:24px;box-shadow:9px 9px 0 #000}.footer-inner{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<header>
<div class="wrap nav">
<a href="../../Типография_ПС.html">◀ Печатные издания</a>
<a href="../../index.html#works">Главная</a>
</div>
</header>
<main class="wrap">
<section class="project-intro">
<h1>ВАСКО ДА ГАМА</h1>
<p class="project-desc">Серия книг по исследованию Африки погружает нас в события, способствующие её открытию, а формат журнала экспедиции помогает лучше освоить исторический текст. </p>
</section>
<section class="case-frame">
<img src="vasco_da_gama.jpg" alt="Васко да Гамма">
</section>
</main>
<footer>
<div class="wrap footer-inner">
<span>© 2026 Портфолио</span>
</div>
</footer>
</body>
</html>
